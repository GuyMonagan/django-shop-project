{% extends "catalog/base.html" %}

{% block content %}
<h1>{{ product.name }}</h1>

{% if product.image %}
    <img src="{{ product.image.url }}" alt="{{ product.name }}" width="300">
{% endif %}

<p><strong>Категория:</strong> {{ product.category }}</p>
<p><strong>Описание:</strong> {{ product.description }}</p>
<p><strong>Цена:</strong> {{ product.price }}₽</p>

<a href="{% url 'catalog:product_update' product.pk %}">Редактировать</a> |
<a href="{% url 'catalog:product_delete' product.pk %}">Удалить</a> |
<a href="{% url 'catalog:product_list' %}">Назад</a>
{% endblock %}
