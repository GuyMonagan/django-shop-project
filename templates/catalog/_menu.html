{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Магазин</a>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
      <li class="nav-item"><a class="nav-link" href="/contacts">Контакты</a></li>
      <li class="nav-item"><a class="nav-link" href="/blog/">Блог</a></li>
    </ul>

    <ul class="navbar-nav">
      {% if user.is_authenticated %}

        <li class="nav-item d-flex align-items-center">
          <a href="{% url 'users:profile_edit' %}" class="nav-link d-flex align-items-center">
            {% if user.avatar %}
              <img src="{{ user.avatar.url }}" alt="аватар" class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover;">
            {% else %}
              <img src="{% static 'default_avatar.png' %}" alt="аватар" class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover;">
            {% endif %}
            <span>{{ user.username }}</span>
          </a>
        </li>

      <li class="nav-item">
        <form method="post" action="{% url 'users:logout' %}" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link" style="padding: 0;">Выйти</button>
        </form>
      </li>

      {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'users:login' %}">Войти</a>
        </li>
      {% endif %}
    </ul>

  </div>
</nav>
