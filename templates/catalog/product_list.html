{% extends "catalog/base.html" %}

{% block content %}
<h1>Список продуктов</h1>

<a href="{% url 'catalog:product_create' %}">Добавить продукт</a>

<ul>
    {% for product in products %}
        <li>
            <a href="{% url 'catalog:product_detail' product.pk %}">
                {{ product.name }}
            </a> — {{ product.price }}₽
        </li>
    {% empty %}
        <li>Пока продуктов нет.</li>
    {% endfor %}
</ul>
{% endblock %}
