<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
</head>

<body class="container mt-5">

  {% include "catalog/_menu.html" %}

  <div class="content">
    {% block content %}
    {% endblock %}
  </div>

    <footer class="mt-5 text-muted text-center">
      <p>&copy; 2025 Магазин. Сделано с Bootstrap и юношеским энтузиазмом.</p>

      {% if user.is_authenticated %}
        <form method="post" action="{% url 'users:rage_quit' %}"
              onsubmit="return confirm('Вы точно хотите всё удалить и уйти в лес?');"
              class="mt-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-sm btn-outline-danger">
            🪓 Удалить всё и уйти в лес
          </button>
        </form>
      {% endif %}
    </footer>


</body>
</html>
