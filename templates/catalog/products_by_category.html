{% extends "catalog/base.html" %}

{% block content %}
  <h1>Продукты в категории: {{ category.name }}</h1>

  <ul>
    {% for product in products %}
      <li>
        <a href="{% url 'catalog:product_detail' product.pk %}">
          {{ product.name }} — {{ product.price }}₽
        </a>
      </li>
    {% empty %}
      <li>В этой категории пока нет товаров.</li>
    {% endfor %}
  </ul>

  <a href="{% url 'catalog:product_list' %}">← Вернуться к списку товаров</a>
{% endblock %}
