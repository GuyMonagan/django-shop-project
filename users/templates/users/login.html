{% extends "catalog/base.html" %}

{% block content %}
<div class="container mt-4">

    {{ form.as_p }}

    Ещё нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрируйтесь</a>
  </p>
</div>
{% endblock %}
